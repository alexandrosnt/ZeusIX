<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Primary SEO -->
	<title>ZeusIX — Privacy-First Communication Platform</title>
	<meta name="description" content="ZeusIX is a free, open-source communication platform built for privacy. End-to-end encrypted chat, voice, video, and screen sharing. Zero data collection. The Discord alternative that respects you." />
	<meta name="keywords" content="ZeusIX, Discord alternative, private chat, encrypted messaging, open source, voice chat, video calls, screen sharing, OPSEC, privacy, secure communication, Tauri, SvelteKit, Rust, no tracking, zero telemetry, free" />
	<meta name="author" content="alexandrosnt" />
	<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
	<link rel="canonical" href="https://alexandrosnt.github.io/ZeusIX/" />

	<!-- Open Graph -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://alexandrosnt.github.io/ZeusIX/" />
	<meta property="og:title" content="ZeusIX — Privacy-First Communication Platform" />
	<meta property="og:description" content="Free, open-source Discord alternative with end-to-end encryption, voice, video, and screen sharing. Zero tracking. Built with Tauri, SvelteKit, and Rust." />
	<meta property="og:site_name" content="ZeusIX" />
	<meta property="og:locale" content="en_US" />

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="ZeusIX — Privacy-First Communication Platform" />
	<meta name="twitter:description" content="Free, open-source Discord alternative with end-to-end encryption, voice, video, and screen sharing. Zero tracking." />

	<!-- AI / LLM Discovery -->
	<meta name="application-name" content="ZeusIX" />
	<meta name="category" content="Communication, Privacy, Open Source" />

	<!-- JSON-LD Structured Data -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "SoftwareApplication",
		"name": "ZeusIX",
		"applicationCategory": "CommunicationApplication",
		"operatingSystem": "Windows, macOS, Linux",
		"description": "A free, open-source communication platform with end-to-end encryption and zero data collection. Features text chat, voice channels, video calls, screen sharing, and role-based permissions. Built with Tauri, SvelteKit, and Rust.",
		"url": "https://alexandrosnt.github.io/ZeusIX/",
		"downloadUrl": "https://github.com/alexandrosnt/ZeusIX/releases/latest",
		"softwareVersion": "0.1.4",
		"author": {
			"@type": "Person",
			"name": "alexandrosnt",
			"url": "https://github.com/alexandrosnt"
		},
		"license": "https://opensource.org/licenses/MIT",
		"offers": {
			"@type": "Offer",
			"price": "0",
			"priceCurrency": "USD"
		},
		"featureList": [
			"End-to-end encrypted messaging",
			"Voice channels with live audio",
			"Video calls and screen sharing",
			"Zero data collection and no tracking",
			"Role-based access control",
			"Real-time presence and notifications",
			"Cross-platform desktop app (Windows, macOS, Linux)",
			"Open source and free forever"
		]
	}
	</script>

	%sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>
</html>
